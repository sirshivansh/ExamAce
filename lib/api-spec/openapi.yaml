openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analyze
    description: PDF analysis operations
  - name: answer
    description: Answer generation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /generate-answer:
    post:
      operationId: generateAnswer
      tags: [answer]
      summary: Generate a structured exam answer for a question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateAnswerBody"
      responses:
        "200":
          description: Structured answer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateAnswerResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RepeatedQuestion:
      type: object
      properties:
        question:
          type: string
        count:
          type: integer
      required:
        - question
        - count
    ImportantTopic:
      type: object
      properties:
        topic:
          type: string
        priority:
          type: string
          enum: [High, Medium, Low]
      required:
        - topic
        - priority
    AnalysisResult:
      type: object
      properties:
        repeatedQuestions:
          type: array
          items:
            $ref: "#/components/schemas/RepeatedQuestion"
        importantTopics:
          type: array
          items:
            $ref: "#/components/schemas/ImportantTopic"
        expectedQuestions:
          type: array
          items:
            type: string
          description: Predicted questions likely to appear in the next exam sitting
      required:
        - repeatedQuestions
        - importantTopics
        - expectedQuestions
    GenerateAnswerBody:
      type: object
      properties:
        question:
          type: string
          description: The exam question to generate an answer for
      required:
        - question
    AnswerDetail:
      type: object
      properties:
        definition:
          type: string
          description: A clear one or two sentence definition
        explanation:
          type: array
          items:
            type: string
          description: Bullet point explanations
        example:
          type: string
          description: Optional real-world or conceptual example
        conclusion:
          type: string
          description: A concise closing statement
      required:
        - definition
        - explanation
        - conclusion
    GenerateAnswerResult:
      type: object
      properties:
        answer:
          $ref: "#/components/schemas/AnswerDetail"
      required:
        - answer
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
