openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analyze
    description: PDF analysis operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RepeatedQuestion:
      type: object
      properties:
        question:
          type: string
          description: The grouped question text
        count:
          type: integer
          description: Number of times this question or close variant appeared
      required:
        - question
        - count
    ImportantTopic:
      type: object
      properties:
        topic:
          type: string
          description: Topic name
        priority:
          type: string
          enum: [High, Medium, Low]
          description: Priority ranking based on frequency and relevance
      required:
        - topic
        - priority
    AnalysisResult:
      type: object
      properties:
        repeatedQuestions:
          type: array
          items:
            $ref: "#/components/schemas/RepeatedQuestion"
        importantTopics:
          type: array
          items:
            $ref: "#/components/schemas/ImportantTopic"
      required:
        - repeatedQuestions
        - importantTopics
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
