openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analyze
    description: PDF analysis operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analyze/result:
    get:
      operationId: getAnalysisResult
      tags: [analyze]
      summary: Get a previously cached analysis result (placeholder)
      parameters:
        - in: query
          name: id
          schema:
            type: string
          required: false
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RepeatedQuestion:
      type: object
      properties:
        question:
          type: string
          description: The question text
        frequency:
          type: integer
          description: How many times this topic/question appeared
        years:
          type: array
          items:
            type: string
          description: Years or contexts where this appeared
      required:
        - question
        - frequency
        - years
    ImportantTopic:
      type: object
      properties:
        topic:
          type: string
          description: Topic name
        description:
          type: string
          description: Brief description of why it's important
        weightage:
          type: string
          description: Estimated weightage (High / Medium / Low)
      required:
        - topic
        - description
        - weightage
    AnswerEntry:
      type: object
      properties:
        question:
          type: string
          description: The question
        answer:
          type: string
          description: A concise model answer
      required:
        - question
        - answer
    AnalysisResult:
      type: object
      properties:
        repeatedQuestions:
          type: array
          items:
            $ref: "#/components/schemas/RepeatedQuestion"
        importantTopics:
          type: array
          items:
            $ref: "#/components/schemas/ImportantTopic"
        answers:
          type: array
          items:
            $ref: "#/components/schemas/AnswerEntry"
        summary:
          type: string
          description: Brief overall summary of the exam paper
      required:
        - repeatedQuestions
        - importantTopics
        - answers
        - summary
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
