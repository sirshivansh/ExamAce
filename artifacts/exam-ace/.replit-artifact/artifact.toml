kind = "web"
previewPath = "/"
title = "ExamAce"
version = "1.0.0"
id = "artifacts/exam-ace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21771

[services.development]
run = "pnpm --filter @workspace/exam-ace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/exam-ace", "run", "build" ]
publicDir = "artifacts/exam-ace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21771"
BASE_PATH = "/"
